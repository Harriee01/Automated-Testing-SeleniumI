name: Newsletter Signup — Selenium CI
#trigger: run on every push or pull request targeting main
#ensuring that all changes are validated before merging
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run Selenium Tests & Generate Allure Report
    # ubuntu-latest is the standard choice: free, fast, and Chrome is easy to install
    runs-on: ubuntu-latest

    steps:

      # Check out the source code from the repository

      - name: Checkout repository
        uses: actions/checkout@v4


      # Set up Java 21
      # temurin is the community build of OpenJDK — reliable and free

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven



      #Install specific stable version of Google Chrome for reproducibility

      - name: Install Google Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      # Run the Selenium tests
      - name: Run tests with Maven
        run: mvn clean test --no-transfer-progress


      # Upload Allure results as an artifact
      # This preserves the raw JSON results even if the tests fail
      # to still generate the report afterwards.
      # 'if: always()' ensures upload happens even on test failure.

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: target/allure-results
          retention-days: 30

      # Generate Allure HTML report
      - name: Generate Allure HTML Report
        if: always()
        uses: simple-elf/allure-report-action@master
        with:
          allure_results: target/allure-results
          allure_report: allure-report
          allure_history: allure-history

      # Upload the generated HTML report as an artifact
      # To download it from the GitHub Actions run summary
      # and open index.html locally in a browser.

      - name: Upload Allure HTML Report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-html-report
          path: allure-report
          retention-days: 30


      #  Notify on failure via Slack
      - name: Notify Slack on failure
        if: failure()
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
           {
              "text": "❌ Newsletter Signup tests FAILED on branch `${{ github.ref_name }}`.\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
             }
        env:
           SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
           SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK